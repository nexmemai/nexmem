[pytest]
pythonpath = .
asyncio_mode = auto

# Default test environment.
# - DEMO_MODE=true makes routers short-circuit to in-memory stores.
# - DATABASE_URL is a non-routable placeholder so Settings() validates.
#   Routers that branch on demo_mode never actually open a connection.
# - Integration tests that need a real database opt in by overriding
#   DATABASE_URL (and DEMO_MODE=false) in their own session env, and are
#   gated by RUN_DB_TESTS=1.
env =
    DEMO_MODE=true
    SECRET_KEY=test-secret-key-for-ci-only-do-not-use-in-prod-please-32chars
    OPENAI_API_KEY=sk-test-placeholder
    DATABASE_URL=postgresql+asyncpg://placeholder:placeholder@127.0.0.1:1/placeholder
    ENVIRONMENT=development

# Test markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests requiring a live database (gated by RUN_DB_TESTS=1)
    unit: marks pure unit tests with no external dependencies

addopts = -v --tb=short
