[pytest]
pythonpath = .
asyncio_mode = auto

# Set demo mode so the full suite runs without any external services
env =
    DEMO_MODE=true
    SECRET_KEY=test-secret-key-for-ci-only-32-chars
    OPENAI_API_KEY=sk-test-placeholder

# Test markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests requiring a live database
    unit: marks pure unit tests with no external dependencies

# Coverage settings
addopts = -v --tb=short
