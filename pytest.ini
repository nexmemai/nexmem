[pytest]
pythonpath = .
asyncio_mode = auto

# Collect ONLY the backend test suite. The SDK packages ship their own
# test suites under nexmem-py/tests (run via `pytest` after `pip install
# -e nexmem-py`) and nexmem-mcp/tests (run with the MCP server on
# sys.path); neither package is pip-installed in the backend CI job
# (lint-and-test installs requirements.txt + requirements-dev.txt only),
# so collecting them at the repo root raises an ImportError and fails the
# whole run. Scoping to `tests` keeps the backend `--cov=app` job honest
# and matches its documented intent. See .github/workflows/ci.yml.
testpaths = tests

# Default to demo mode so the unit suite runs without external services.
# Integration tests (mark: integration) override DEMO_MODE in CI via the
# integration-tests workflow job.
env =
    D:DEMO_MODE=true
    D:SECRET_KEY=ci-test-secret-key-must-be-at-least-32-characters-long
    D:OPENAI_API_KEY=sk-test-placeholder
    D:DATABASE_URL=

# Test markers
markers =
    slow: marks tests as slow (requires network access for model downloads)
    integration: marks tests requiring a live database (RUN_DB_TESTS=1 in CI)
    unit: marks pure unit tests with no external dependencies

# Default selection: unit-style tests only. CI overrides with -m integration
# in the integration job.
addopts = -v --tb=short -m "not slow and not integration"
