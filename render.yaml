services:
  - type: web
    name: nexmem-api
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health/live
    envVars:
      - key: DATABASE_URL
        value: postgresql+asyncpg://postgres:***REDACTED_PASSWORD***@db.***REDACTED_PROJECT_ID***.supabase.co:5432/postgres
      - key: REDIS_URL
        fromService:
          type: redis
          name: nexmem-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEMO_MODE
        value: "false"
      - key: ENVIRONMENT
        value: "production"
      - key: ALLOWED_ORIGINS
        value: "https://nexmem-api.onrender.com"
      - key: OPENAI_API_KEY
        sync: false
      - key: CONSOLIDATION_INTERVAL_MINUTES
        value: "30"
      - key: PYTHON_VERSION
        value: "3.11.9"

  - type: worker
    name: nexmem-celery-worker
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A app.celery_app.celery_app worker --loglevel=info --concurrency=2"
    envVars:
      - key: DATABASE_URL
        value: postgresql+asyncpg://postgres:***REDACTED_PASSWORD***@db.***REDACTED_PROJECT_ID***.supabase.co:5432/postgres
      - key: REDIS_URL
        fromService:
          type: redis
          name: nexmem-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: "production"
      - key: PYTHON_VERSION
        value: "3.11.9"

  - type: redis
    name: nexmem-redis
    plan: free
    ipAllowList: []

databases: []
