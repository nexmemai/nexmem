services:
  - type: web
    name: nexmem-api
    env: python
    plan: free
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health/live
    envVars:
      # DATABASE_URL must be supplied via the Render dashboard.
      # No project-specific URL is ever committed to the repo.
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: nexmem-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEMO_MODE
        value: "false"
      - key: ENVIRONMENT
        value: "production"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: METRICS_SECRET_KEY
        sync: false
      - key: CONSOLIDATION_INTERVAL_MINUTES
        value: "30"
      - key: PYTHON_VERSION
        value: "3.11.9"

  - type: worker
    name: nexmem-celery-worker
    env: python
    plan: free
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "celery -A app.celery_app.celery_app worker --loglevel=info --concurrency=2"
    envVars:
      # DATABASE_URL must be supplied via the Render dashboard.
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: nexmem-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: "production"
      - key: PYTHON_VERSION
        value: "3.11.9"

  - type: redis
    name: nexmem-redis
    plan: free
    ipAllowList: []

  - type: worker
    name: nexmem-celery-beat
    env: python
    plan: free
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "celery -A app.celery_app.celery_app beat --loglevel=info"
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: nexmem-redis
          property: connectionString
      - key: CONSOLIDATION_INTERVAL_MINUTES
        value: "30"
      - key: PYTHON_VERSION
        value: "3.11.9"

databases: []
