services:
  - type: web
    name: nexmem-api
    env: python
    plan: free
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    # Migrations run via advisory-locked wrapper so multi-replica deploys
    # cannot race. Web service runs a single uvicorn worker because the
    # in-process NetworkX graph in app/services/engram_processor.py is not
    # shared across processes (see BACKEND_RISKS.md R-107).
    startCommand: "scripts/run_with_migrations.sh uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1"
    healthCheckPath: /health/live
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: nexmem-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEMO_MODE
        value: "false"
      - key: ENVIRONMENT
        value: "production"
      - key: ALLOWED_ORIGINS
        value: "https://nexmem.onrender.com,https://nexmem.ai"
      - key: OPENAI_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: METRICS_SECRET_KEY
        sync: false
      - key: CONSOLIDATION_INTERVAL_MINUTES
        value: "30"
      - key: PYTHON_VERSION
        value: "3.11.9"

  - type: worker
    name: nexmem-celery-worker
    env: python
    plan: free
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "celery -A app.celery_app.celery_app worker --loglevel=info --concurrency=2"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: nexmem-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: "production"
      - key: PYTHON_VERSION
        value: "3.11.9"

  - type: redis
    name: nexmem-redis
    plan: free
    ipAllowList: []

  - type: worker
    name: nexmem-celery-beat
    env: python
    plan: free
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "celery -A app.celery_app.celery_app beat --loglevel=info"
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: nexmem-redis
          property: connectionString
      - key: CONSOLIDATION_INTERVAL_MINUTES
        value: "30"
      - key: PYTHON_VERSION
        value: "3.11.9"

databases: []
