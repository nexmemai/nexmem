name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ── Fast feedback: lint, type-check, unit tests in demo mode ───────────────
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: |
          flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Type check with mypy
        run: mypy app --ignore-missing-imports || true

      - name: Run unit + demo-mode tests
        env:
          DEMO_MODE: "true"
          SECRET_KEY: "ci-test-secret-but-32+-chars-long-for-tests"
          OPENAI_API_KEY: "sk-test-placeholder"
          # Tests under tests/integration/ are skipped without RUN_DB_TESTS=1.
        run: pytest tests --tb=short --ignore=tests/integration

  # ── Real Postgres + Redis: auth, RLS, quotas, migrations ───────────────────
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexmem_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Wait for Postgres + Redis
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U postgres && break
            sleep 1
          done
          for i in $(seq 1 30); do
            redis-cli -h localhost ping && break
            sleep 1
          done

      - name: Enable pgvector extension
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d nexmem_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
          psql -h localhost -U postgres -d nexmem_test -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"

      - name: Run integration tests (real Postgres + Redis)
        env:
          RUN_DB_TESTS: "1"
          DEMO_MODE: "false"
          ENVIRONMENT: "development"
          SECRET_KEY: "ci-integration-secret-32-or-more-chars-long"
          OPENAI_API_KEY: "sk-test-placeholder"
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/nexmem_test"
          REDIS_URL: "redis://localhost:6379/0"
          # ML-heavy tests still need huggingface downloads; run those nightly.
          RUN_ML_TESTS: "0"
        run: pytest tests/integration --tb=short

  # ── Static security scan ───────────────────────────────────────────────────
  security-audit:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install bandit
        run: pip install bandit==1.7.9

      - name: Run SAST security audit
        run: python tests/run_security_audit.py

  # ── Container build smoke test ─────────────────────────────────────────────
  docker-build:
    needs: integration-tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: nexmem-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
