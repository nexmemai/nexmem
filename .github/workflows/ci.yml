name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: "pip"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 app --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
        
    - name: Type check with mypy
      run: |
        mypy app --ignore-missing-imports || true
        
    - name: Run tests (demo mode — no DB required)
      env:
        DEMO_MODE: "true"
        SECRET_KEY: "ci-test-secret"
        OPENAI_API_KEY: "sk-test-placeholder"
      run: |
        pytest -v --tb=short
        
  security-audit:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: "pip"
        
    - name: Install bandit
      run: pip install bandit==1.7.9
      
    - name: Run SAST security audit
      run: python tests/run_security_audit.py

  docker-build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Build Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false  # Change to true when registry is configured
        tags: nexmem-api:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
