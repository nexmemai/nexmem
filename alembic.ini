# alembic.ini — Alembic configuration file

[alembic]
# Dynamically overridden in alembic/env.py via settings.database_url
script_location = alembic

# Template used to generate migration file names:
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for file names
timezone = UTC

# Maximum length of characters to include in slugified file names
truncate_slug_length = 40

# Set to 'true' to enable sqlalchemy.engine.Engine.echo
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Leave empty — add black/ruff hooks here if needed

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
